# Reference skills


# ADLC lifecycle rules

Single source of truth for how an ADLC run progresses. The orchestrator and every stage follow it.

## Artifacts (in the target project, never the framework)
```
docs/adlc/
├── constitution.md   # project principles (once per repo; `adlc constitution`)
└── <KEY>/
    ├── state.md          # the state machine below (managed via `adlc get-state/set-state`)
    ├── ticket.md         # stage 1 — requirements spec (WHAT/WHY)
    ├── spec.md           # stage 2 — technical plan (HOW) + Constitution Check (reviewed at Gate 1)
    ├── tasks.md          # stage 3 — task breakdown of the approved spec
    └── verification.md   # stage 6
docs/adlc/tickets/<KEY>.md   # local-mode ticket mirror
```

## Stage order
`intake → spec → [GATE 1] → tasks → code → tests → verify → [GATE 2] → ship`

| Stage | Advances when |
|-------|---------------|
| intake | `ticket.md` has user stories + Gherkin scenarios + functional/success criteria |
| spec | `spec.md` written, Constitution Check passes → Gate 1 |
| tasks | `tasks.md` covers every Scenario + FR |
| code | change implemented on the feature branch, per `tasks.md` |
| tests | tests written per the spec Test plan |
| verify | `verification.md` = PASS (else loop to code) |
| ship | Gate 2 approved, then commit + push |

## The two gates (never skip)
- **GATE 1 — after spec:** human approves `spec.md` (and its Constitution Check) before tasks or
  code. Approve / Request changes / Abort.
- **GATE 2 — before push:** human approves before anything is pushed. Approve & push / Request
  changes / Commit locally only / Abort.

Record approvals with `adlc approve <KEY> gate1|gate2`.

## state.md fields
`key · title · created · branch · jira_mode(local|jira) · current_stage(intake|spec|tasks|code|tests|verify|ship|done) · gate1_spec_approved · gate2_push_approved · verify_attempts` plus a `## Log`.

## Resume logic
Re-running the pipeline reads `current_stage` first and continues from there. Never re-run a
completed stage unless a gate sent it back or the user asks. Update `current_stage` + append to
`## Log` after every stage.

## Verify → code retry loop
FAIL → bump `verify_attempts`, fix in stage 4, re-run tests + verify. After 3 failures, stop and
surface the blocker to the human.

## Degradation
No requirement source (no Jira, no referenced item) → **interview the requester**
(`requirement-elicitation`) and store locally; a tracker is optional, not required. No interactive
user → infer requirements and mark assumptions `[NEEDS CLARIFICATION]`. No Jira creds → local
tickets. No remote → local commit only. Always progress as far as possible rather than hard-failing.


# constitution

The **constitution** is the project's highest-authority standard: a short list of enforceable
principles and constraints that every `spec.md` is scored against before Gate 1. It is the
spec-kit *constitution* concept — the thing that keeps designs consistent across many tickets.

## Where it lives
`docs/adlc/constitution.md` — **project-level, one per repo** (not per ticket). Create or open it
with `adlc constitution` (seeds it from the template if missing, then edit it in place).

## Authoring principles (keep it enforceable)
1. **Each principle is a testable MUST**, not an aspiration. "The system MUST have a test for every
   public endpoint," not "we value quality."
2. **Few and sharp.** 3–7 principles a reviewer can actually hold in mind. More than that and none
   get enforced.
3. **State the rationale** in one line — reviewers need the *why* to apply it to new cases.
4. **Version it (semver).** MAJOR = a principle removed/redefined, MINOR = added, PATCH = wording.
   Bump the version and *Last amended* on every change.
5. Cover **constraints & standards** too: pinned stack/versions, coding standards (point to the
   linter that enforces them), security/data rules, and the testing bar for "done".

## The Constitution Check (in every spec.md)
The stage-2 spec must include a **Constitution Check** table scoring the design principle-by-
principle (✅/❌ + note) with an overall **PASS / PASS-with-justified-exceptions / FAIL**:
- **PASS** → proceed to Gate 1.
- **Exception** → allowed only if justified in the spec's **Complexity tracking** table (what,
  why necessary, which simpler alternative was rejected and why).
- **FAIL** (unjustified violation) → redesign; do not advance.

No constitution file yet is not a blocker: note "no constitution — using defaults" in the check and
suggest running `adlc constitution`.

## Output
For authoring: the path to `constitution.md`. For a check: the filled Constitution Check table and
the overall result, surfaced in the Gate 1 summary.


# jira-ticket

Store the run's ticket and get a **key**. A tracker is **one source, not a prerequisite** — Jira is
optional and local files always work. This skill covers *where the ticket lives and how it's keyed*;
the *requirement content* (Gherkin criteria, FRs, success criteria) is gathered by the stage-1
source chain — a referenced item, Jira, or by interviewing the requester
(`requirement-elicitation`) when nothing else supplies it. All mechanics are in the `adlc` script.

## Mode
`adlc jira mode` → `jira` (all three `JIRA_*` vars set) or `local`. Record it with
`adlc set-state <KEY> jira_mode <mode>`. No Jira is not a blocker — local mode is a first-class
path, not a degraded one.

## Pick vs create
If the user referenced a key, **pick** it; otherwise **create**.
- **Jira mode:**
  - pick: `adlc jira pick` lists open issues (`KEY  status  summary`); choose one.
  - create: `adlc jira create "<summary>" "<description>"` prints the new KEY. Put the Gherkin
    `Feature` + `Scenario` block into the description.
  - Then `adlc init "<request>" <KEY>` seeds the local run dir under that real key.
- **Local mode:** `adlc init "<request>"` generates the next `ADLC-00N` key and seeds everything.

If the request is too thin to fill the criteria, **elicit first** (`requirement-elicitation`), then
create/seed the ticket with the gathered content.

## ticket.md shape (both modes)
Sections: title line `# <KEY>: <summary>`, a metadata block (Status/Type/Mode/Created), a
**Description**, an **Acceptance criteria (Gherkin)** block — one `Feature` with `Scenario`s in
`Given/When/Then` form — and **Notes**. The `init` command writes a stub from the template; fill in
the real content.

## Output
Return the **key**, path to `ticket.md`, the **mode**, and the Gherkin acceptance scenarios.

## Under the hood (for reference / non-adlc hosts)
Jira REST v3: `POST /rest/api/3/issue` (ADF description) to create, `GET /rest/api/3/search`
(JQL) to pick, HTTP Basic auth `JIRA_EMAIL:JIRA_API_TOKEN`. Implemented with the Python stdlib in
`scripts/jira_ticket.py` (no pip installs). Run it with a real interpreter (`py` on Windows,
`python3` on macOS/Linux) — the `adlc jira …` wrapper handles interpreter detection for you.


# requirement-elicitation

The universal fallback for requirement gathering. When there is **no Jira ticket, no issue, and no
requirements doc** — or the request is a vague one-liner — don't just stamp out an empty template.
**Interview the requester**, then write a complete `ticket.md`. This is spec-kit's *clarify* step,
applied at intake.

## When to elicit
- The chosen source has no usable detail (local mode, or a tracker item that's just a title), **or**
- the request is underspecified: you cannot write concrete Gherkin scenarios and functional
  requirements from it without guessing.

If the request is already detailed enough to write testable criteria, skip the interview — don't
interrogate the user for its own sake.

## What to ask (cover the gaps, in priority order)
Ask about the dimensions you can't reasonably infer. Lead with the highest-leverage unknowns.
1. **Problem & outcome** — what's broken/missing, and what does "done" look like for the user?
2. **Users & context** — who uses this, and what's the current behavior?
3. **Scope** — the must-haves for *this* change, and explicit **non-goals** / out-of-scope.
4. **Acceptance behavior** — concrete examples of the happy path (these become Gherkin scenarios).
5. **Edge cases & errors** — empty/invalid/unauthorized inputs, limits, concurrency, failure modes.
6. **Constraints** — performance, security/data, compatibility, and any fixed tech choices.
7. **Success criteria** — a measurable, technology-agnostic signal of success (feeds `SC-00N`).

## How to ask (host-adaptive)
- **Claude Code:** use `AskUserQuestion` — batch 2–4 crisp questions with sensible multiple-choice
  options (always leaving room for a free-text answer). Prefer one well-chosen round; ask a second
  round only if answers open a material new gap.
- **Other interactive hosts:** ask a short **numbered list** of questions in one message; parse the
  replies.
- **Few and sharp.** 3–6 questions total. Offer a recommended default per question so the user can
  accept fast. Never block on trivia you can decide yourself — decide it and note the assumption.

## Converge
1. Restate the requirements you now hold as a short **assumptions** summary ("Here's what I'll build
   unless you correct me").
2. Turn the answers into the ticket sections: user stories, the Gherkin `Feature`, functional
   requirements (`FR-00N`), success criteria (`SC-00N`), edge cases.
3. Mark anything still open with `[NEEDS CLARIFICATION: <question>]` — always include the question
   **after the colon** (that colon form is what `adlc clarifications <KEY>` detects; the bare
   `[NEEDS CLARIFICATION]` in template prose is ignored). Gate 1 must have none left.

## Degradation (non-interactive / headless / CI)
No user to interview? Do **not** hard-fail. Infer the most reasonable requirements from the request,
write them, and mark **every** inferred decision with `[NEEDS CLARIFICATION]` so the human resolves
them at Gate 1. Surface the list explicitly in the intake output.

## Output
A completed `ticket.md` (or Jira/issue description) plus the list of any remaining
`[NEEDS CLARIFICATION]` items to carry into the Gate 1 review.


# spec-design

Produce a concise, reviewable **technical plan** — complete enough to approve, short enough to
read. This is the spec-kit *plan* step: the requirements are already fixed in `ticket.md` (the
WHAT); the spec decides the HOW.

## Rules
1. **Requirements are frozen.** Read `ticket.md` (user stories, Gherkin scenarios, functional &
   success criteria); design to satisfy them. Don't reword them — a wrong requirement is Gate-1
   feedback.
2. **Ground it in the real codebase.** Read the relevant files first; name actual files,
   functions, and patterns to reuse. Fill **Technical context** from what you find, not assumptions.
3. **Constitution Check (gate).** Score the design against every principle in
   `docs/adlc/constitution.md` (see the `constitution` skill). It must PASS; any exception goes in
   **Complexity tracking** with a justification. No constitution file → note defaults and proceed.
4. **Traceability:** every `Scenario` maps to at least one Test-plan row. Call out any scenario you
   cannot test and why.
5. **Minimal surface:** prefer extending existing code; justify each new file/dependency in one line.
6. **No code yet** — describe the change; small signatures/snippets are fine.
7. **Be honest about risk** — what could break, and how to roll back. Keep it to ~one screen.

## Sections (write to `docs/adlc/<KEY>/spec.md`)
1. **Summary** — the primary requirement + chosen approach in 2–3 sentences.
2. **Constitution Check** — principle-by-principle PASS/FAIL table; overall result.
3. **Technical context** — language/version, deps, storage, test framework, platform, constraints.
4. **Proposed approach** — the design in prose, referencing concrete files/functions; key
   decisions and rejected alternatives in one line each.
5. **Project structure & files to change** — a table of file → change (mark new files).
6. **Test plan** — a table mapping each `Scenario` → test → type (unit/integration/manual).
7. **Complexity tracking** — justify any constitution/simplicity exception (empty is good).
8. **Risks & rollback** — risks → mitigations; rollback = revert the branch.
9. **Open questions** — remaining `[NEEDS CLARIFICATION]` for Gate 1 (empty if none).

## Output
Return the path to `spec.md`, a 2–3 sentence approach summary, and the Constitution Check result
for the Gate 1 prompt.


# gherkin-criteria

The ADLC standard for acceptance criteria is **Gherkin**, the plain-language BDD
notation. Every criterion is a `Scenario` under one `Feature`, described only in terms of
observable behavior (`Given` context → `When` action → `Then` outcome). This makes each
criterion unambiguous, independently testable, and traceable one-to-one into the spec's Test
plan and into stage-4 tests.

## The grammar (keep to this exact subset)
```gherkin
Feature: <short feature name>
  <one-line description of the capability and who it is for>

  Background:            # optional — Given steps shared by every scenario
    Given <shared precondition>

  Scenario: <one concrete behavior, phrased as an outcome>
    Given <initial context / preconditions>
    When  <the action or event that triggers the behavior>
    Then  <the single, observable expected outcome>
    And   <a further outcome, if needed>

  Scenario Outline: <behavior that varies by data>   # optional
    Given <context with a <placeholder>>
    When  <action with a <placeholder>>
    Then  <outcome with a <placeholder>>
    Examples:
      | placeholder | outcome |
      | value-1     | ...     |
      | value-2     | ...     |
```

Keywords: `Feature`, `Background`, `Scenario`, `Scenario Outline` / `Examples`, and the steps
`Given` / `When` / `Then` / `And` / `But`. Nothing else.

## Rules for good scenarios
1. **One behavior per scenario.** If a scenario needs two unrelated `When`s, split it.
2. **Declarative, not imperative.** Describe *what* the system does, not UI click-by-click steps
   (`When the user submits an invalid email`, not `When the user types … and clicks the button`).
3. **Observable outcomes only.** Every `Then` must be checkable from outside the system —
   a response, a value, a stored record, a raised error. No "Then it works".
4. **Concrete, not vague.** Prefer real values (`Then the response status is 200 and body is
   {"status":"ok"}`) over adjectives ("Then it responds correctly").
5. **Cover the unhappy paths.** Include at least the primary error/edge scenario, not only the
   happy path.
6. **Independent scenarios.** Each stands alone; don't rely on a previous scenario's side effects
   (use `Background` for shared setup instead).
7. **3–6 scenarios** for a typical ticket. If you need many more, the ticket is too big — note it.

## How it flows through the pipeline
- **Stage 1 (intake):** write the `Feature` + scenarios into `ticket.md` under *Acceptance criteria*.
- **Stage 2 (spec):** copy the same `Feature` block into `spec.md` verbatim (the standard,
  frozen contract), then map **each Scenario → at least one Test-plan row**.
- **Stage 4 (tests):** implement one test per scenario (BDD runner if the project already uses one
  — `behave`, `pytest-bdd`, `cucumber`, `godog`, …; otherwise a plainly-named test per scenario).
- **Stage 5 (verify):** report coverage as *Scenario → passing test*.

Traceability rule: a Scenario with no test is a gap; a test with no Scenario is scope creep.

## Output
The `Feature` block (valid Gherkin) plus a one-line note on any scenario that can only be
verified manually and why.


# task-breakdown

Turn the approved `spec.md` into an executable checklist that drives implementation — the spec-kit
*tasks* step. It runs **after Gate 1** and produces `docs/adlc/<KEY>/tasks.md`.

## Rules
1. **Approved spec is the only input.** No redesign. A blocking gap or unresolved
   `[NEEDS CLARIFICATION]` → return to Gate 1, don't guess.
2. **Stable IDs.** Number tasks `T001, T002, …`; never renumber once code references them.
3. **Small and verifiable.** One task = one change a coder can do and check in one sitting. Split
   anything larger.
4. **Order by story, earliest-testable-first.** Group tasks under their user story (US-1/P1 first)
   so a working slice appears early. Setup/prerequisite tasks come first.
5. **Parallel markers.** Tag `[P]` only when a task shares no files and has no ordering dependency
   with others in flight. State real dependencies explicitly (`deps: T00N`).
6. **Traceability both ways.** Each task names the file(s) it touches and what it covers
   (`covers: FR-002, Scenario "…"`). Every `Scenario`, every `FR-00N`, and every success criterion
   (`SC-00N`) in the spec maps to at least one task — that is the Coverage check.

## Sections (write to `docs/adlc/<KEY>/tasks.md`)
1. **Setup / prerequisites** — scaffolding/deps the rest depend on.
2. **Tasks by user story** — ordered, with IDs, `[P]`, `deps:`, and `covers:` notes.
3. **Polish / cross-cutting** — docs, logging, cleanup, perf toward success criteria.
4. **Dependency notes** — the ordering constraints in one place.
5. **Coverage check** — the assertion that every Scenario + FR has a task (gap → back to Gate 1).

## Output
Return the path to `tasks.md`, the task count, the `[P]` groups, and any coverage gap/blocker.


