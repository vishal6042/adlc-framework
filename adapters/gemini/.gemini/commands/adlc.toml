description = "Run the Agentic Development Life Cycle (Jira -> spec -> approval -> code -> tests -> verify -> push)."

prompt = """
# ADLC Orchestrator (runbook)

Drive a feature from request to pushed branch by running seven roles in sequence, enforcing two
human approval gates, and keeping a resumable state file. You are the only component that talks
to the user.

The flow is spec-kit-aligned: **constitution** (project principles) → **requirements** (ticket, the
WHAT) → **plan** (spec, the HOW) → Gate 1 → **tasks** → code → tests → verify → Gate 2 → ship.

**Host adaptation:** if your host has real sub-agents (e.g. Claude Code), delegate each stage to
the matching `adlc-*` agent for context isolation. If it is single-agent (Cline, Gemini CLI,
most others), perform each role **inline, one at a time**, following the corresponding
`stages/<n>-*.md`. Either way the instructions and gates are identical.

**Deterministic ops:** everything mechanical is the `adlc` script — key generation, state
read/write, Jira calls, branch, commit, push, compare URL. Never reimplement these. The
reasoning stages (spec, code, tests) are yours.

## Input
`<request>` is one of:
- a plain-English feature request → start a new run;
- `resume <KEY>` → continue from `docs/adlc/<KEY>/state.md`;
- `status <KEY>` → run `adlc status <KEY>` and stop.

## Resume first
Before starting, if a KEY is known, read state: `adlc get-state <KEY> current_stage`. Continue
from that stage — never re-run a completed stage unless a gate sent it back or the user asks.

## Constitution (once per project, before stage 1)
Ensure `docs/adlc/constitution.md` exists: `adlc constitution` seeds it from the template if
missing. Its principles are the standard the spec is checked against at Gate 1. If it's still a
template stub, note that and proceed with defaults — don't block the run.

## Requirement source (stage 1 is source-agnostic)
A tracker is optional. Stage 1 gathers requirements from the first available source: a **referenced
item** (Jira key / issue / doc) → **Jira** (if configured) → **interactive elicitation** (interview
the requester) → stored in **local files**. No Jira is a first-class path, not a failure. When the
request is thin and no source has the detail, intake **interviews the user** (`AskUserQuestion` on
Claude) rather than emitting a blank ticket. Headless with no user → infer and mark every
assumption `[NEEDS CLARIFICATION]`.

## Pipeline
| Stage | Role | Do after it returns |
|-------|------|---------------------|
| 1 intake | `stages/1-intake.md` | requirements ticket (WHAT) exists (from a tracker or by elicitation); state → spec |
| 2 spec | `stages/2-spec.md` | persist `spec.md` (HOW) + Constitution Check; **run GATE 1** |
| 3 tasks | `stages/3-tasks.md` | `tasks.md` from the approved spec; state → code |
| 4 code | `stages/4-code.md` | code on the feature branch, per `tasks.md` |
| 5 tests | `stages/5-tests.md` | tests written |
| 6 verify | `stages/6-verify.md` | PASS → continue; FAIL → retry loop |
| 7 ship | `stages/7-ship.md` | **run GATE 2 first**, then `adlc ship <KEY>` |

After every stage, the role updates `current_stage`; append a line to the `## Log` in `state.md`.

## GATE 1 — approve the plan (after stage 2)
Do not proceed to tasks/code until the user approves. First run `adlc clarifications <KEY>` — if
it lists anything, resolve those before approval. Present the spec summary + the **Constitution
Check result** + the path `docs/adlc/<KEY>/spec.md` + any open questions or remaining
`[NEEDS CLARIFICATION]`, and ask: **Approve / Request changes / Abort**.
- Approve → `adlc approve <KEY> gate1`, then continue to stage 3 (tasks).
- Request changes → capture feedback, re-run stage 2, gate again.
- Abort → set `current_stage` to `done`, log, stop.
> If the Constitution Check FAILs (unjustified violation) or a `[NEEDS CLARIFICATION]` is
> unresolved, treat it as "Request changes" — don't present it as ready to approve.

## GATE 2 — approve the push (before stage 7)
After verification PASSES, do not push until the user approves. Show the branch, the diff
summary, and the proposed commit message. Ask: **Approve & push / Request changes (→ stage 3) /
Commit locally only / Abort**.
- Approve → `adlc approve <KEY> gate2`, then `adlc ship <KEY>`.
- Commit locally only → `adlc approve <KEY> gate2` then `adlc ship <KEY> --no-push`.

> Headless/CI hosts (no interactive user): halt at each gate and require re-invocation with the
> approval already recorded (`adlc approve <KEY> gate1|gate2`) before continuing.

## Verify → code retry loop
On FAIL from stage 6: increment `verify_attempts`, send the failure back to stage 4, then re-run
stages 5–6. After **3** failed attempts, stop and surface the blocker to the user.

## Degradation
- No constitution file → note "no constitution — using defaults" and continue (the Constitution
  Check records the same).
- No Jira creds → local ticket mode (automatic). Note it and continue.
- No git remote → `adlc ship` commits locally and says "not pushed". That is success.

## Finish
Print a concise summary: KEY + title, branch, commit SHA, pushed?+compare URL, links to
`ticket.md`/`spec.md`/`tasks.md`/`verification.md`, and the recorded gate decisions.



---

# Stage playbooks


# Stage 1 — Intake (requirements spec)

Turn the request into a tracked ticket with a stable **KEY** and a complete **requirements spec —
the WHAT and WHY**. This is the spec-kit *specify* step: describe the problem, not the solution.
The technical design (the HOW) is stage 2 (`spec.md`) — write no design or code here.

**Requirements can come from anywhere.** A tracker is one source, not a prerequisite. Gather the
detail from the best source available, and when none has it, **interview the requester** — never
hand Gate 1 an empty or guessed ticket.

## Source priority chain (use the first that applies)
1. **Referenced item** — the user named a Jira key / issue / requirements doc → read it and use its
   content as the starting point.
2. **Jira** — configured (`adlc jira mode` = `jira`) and the user wants a new/picked issue →
   create or pick it.
3. **Interactive elicitation** — no usable source, or the request is a thin one-liner → gather the
   requirements by interviewing the requester (see the `requirement-elicitation` skill).
4. **Local file** — the store for everything above when Jira isn't in play; `adlc init` seeds it.

Whatever the source, the *content* — stories, Gherkin scenarios, FRs, success criteria — is the
same. The source only decides where the ticket is stored.

## Rules
- All mechanical work goes through the `adlc` script — do not reimplement key generation,
  state, or Jira calls by hand. Never echo secrets; creds come from env only.
- **Elicit before guessing.** If you cannot write concrete Gherkin scenarios and functional
  requirements from what you have, run the interview (`requirement-elicitation`) rather than
  inventing them. If the request is already detailed, skip the interview.
- **WHAT, not HOW.** No architecture, file names, or tech choices — those belong in `spec.md`.
- **Acceptance criteria are written in Gherkin** — one `Feature` with 3–6 `Scenario`s in
  `Given/When/Then` form (see the `gherkin-criteria` skill). One concrete, observable behavior per
  scenario; include at least one error/edge scenario, not just the happy path.
- **Functional requirements** are numbered and imperative (`FR-001: The system MUST …`); each ties
  to at least one scenario. **Success criteria** (`SC-001`) are measurable and technology-agnostic.
- **Mark every ambiguity inline** with `[NEEDS CLARIFICATION: <question>]` rather than guessing.
  Surface these to the human — Gate 1 must not pass with any left unresolved.

## Workflow
1. **Pick the source** (chain above). Detect the tracker with `adlc jira mode` → `jira`/`local`.
2. **Gather requirements:**
   - Referenced item / Jira issue → read its detail.
   - Otherwise, if the request is thin → **elicit** (interview via `AskUserQuestion` on Claude, a
     short numbered list elsewhere; see `requirement-elicitation`). Headless/CI with no user →
     infer and mark every assumption `[NEEDS CLARIFICATION]`; do not block.
3. **Seed the run + KEY:**
   - **local:** `adlc init "<request>"` prints a new KEY (e.g. `ADLC-001`) and creates
     `docs/adlc/<KEY>/` with `state.md` + `ticket.md`.
   - **jira:** `adlc jira create "<summary>" "<description>"` (prints the KEY) or
     `adlc jira pick`, then `adlc init "<request>" <KEY>` to seed the local run dir.
4. **Fill** `docs/adlc/<KEY>/ticket.md` from the gathered requirements: Description, prioritized
   **User stories** (P1/P2/P3), the Gherkin `Feature` block (happy path + ≥1 edge/error case),
   numbered **Functional requirements**, measurable **Success criteria**, and **Edge cases**. In
   Jira mode, mirror the same content into the issue description.
5. **Check clarity:** `adlc clarifications <KEY>` lists any remaining `[NEEDS CLARIFICATION]`.
6. Record state: `adlc set-state <KEY> jira_mode <mode>` and
   `adlc set-state <KEY> current_stage spec`.

## Output (hand back to the orchestrator)
- The **KEY**, path to `ticket.md`, the **source** used (referenced / jira / elicited / local), the
  Gherkin acceptance scenarios (by name), and any **[NEEDS CLARIFICATION]** items the human must
  resolve.


# Stage 2 — Technical plan / Spec  (→ GATE 1)

Turn the requirements ticket (the WHAT) into a reviewable **technical plan** (the HOW) — the
spec-kit *plan* step. Do NOT write implementation code — a human must approve this plan (Gate 1)
before tasks are generated or code is written.

## Rules
- **WHAT is fixed, decide the HOW.** The requirements — user stories, Gherkin scenarios, functional
  and success criteria — are frozen in `ticket.md`; do not rewrite them. If a requirement is wrong
  or a `[NEEDS CLARIFICATION]` remains, that is Gate-1 feedback, not a silent edit.
- **Ground the design in the real codebase**: search and read first, then reference concrete
  files/functions/patterns to reuse. Do not invent structure or propose new code where something
  suitable already exists. Fill **Technical context** from what you actually find.
- **Constitution Check is a gate.** Evaluate the design against every principle in
  `docs/adlc/constitution.md` and record the result in the spec. Any exception must be justified in
  **Complexity tracking** — an unjustified violation means redesign, not proceed. No constitution
  file? Note "no constitution — using defaults" and suggest `adlc constitution`.
- **Traceability:** every `Scenario` in the ticket maps to at least one row in the spec's Test
  plan. Flag any scenario you cannot test and why.
- Prefer the minimal change; justify each new file/dependency in one line.
- Write ONLY `docs/adlc/<KEY>/spec.md` — touch no source files. Keep it to about one screen.

## Workflow
1. Read `docs/adlc/<KEY>/ticket.md` (requirements) and `docs/adlc/constitution.md` (principles).
2. Explore the target codebase for structure, conventions, and reuse candidates.
3. Write `docs/adlc/<KEY>/spec.md` following the template (Summary, **Constitution Check**,
   Technical context, Proposed approach, Project structure & files, Test plan, Complexity tracking,
   Risks/rollback, Open questions).
4. Verify the Constitution Check passes (or every exception is justified) and the Test-plan table
   has a row for every `Scenario`.
5. `adlc set-state <KEY> current_stage tasks` is done by the orchestrator only *after* Gate 1.

## Output (hand back to the orchestrator)
- Path to `spec.md`, a 2–3 sentence summary of the approach, the **Constitution Check result**,
  and any open questions for the human (for the Gate 1 prompt).


# Stage 3 — Task breakdown  (post-Gate 1)

Turn the **approved** technical plan into an executable checklist — the spec-kit *tasks* step.
Runs only after Gate 1. Do NOT write implementation code here; produce `tasks.md`, which drives
stage 4.

## Rules
- **Work from the approved spec only.** Do not redesign. If the spec still has an unresolved
  `[NEEDS CLARIFICATION]` or a gap that blocks decomposition, **stop and return to Gate 1** rather
  than inventing decisions.
- **Small, ordered, verifiable tasks** with stable IDs (`T001…`). Each names the file(s) it
  touches and what it covers (a `FR-00N` and/or a `Scenario`). Order so each user story becomes
  independently testable as early as possible.
- **Mark parallelizable tasks `[P]`** — only when they share no files and have no ordering
  dependency. Record real dependencies explicitly (`deps: T002`).
- **Full coverage:** every `Scenario` and every `FR-00N` in the spec maps to at least one task;
  every measurable success criterion (`SC-00N`) has a task that addresses it.
- Read-only on source — you may read the codebase to size tasks, but write only `tasks.md`.

## Workflow
1. Read `docs/adlc/<KEY>/spec.md` (approved plan) and `docs/adlc/<KEY>/ticket.md` (requirements).
2. Confirm Gate 1 is approved: `adlc get-state <KEY> gate1_spec_approved` → `true`
   (else stop — tasks come after Gate 1).
3. Write `docs/adlc/<KEY>/tasks.md` from the template: Setup, Tasks by user story (ordered, `[P]`
   markers, deps, coverage notes), Polish, and the Coverage check.
4. Verify the Coverage check holds (every Scenario + FR has a task).
5. `adlc set-state <KEY> current_stage code`.

## Output (hand back to the orchestrator)
- Path to `tasks.md`, the task count, the parallelizable groups, and any coverage gap or blocker
  that should send the run back to Gate 1.


# Stage 4 — Implement

Work through `tasks.md`, writing code for the already-approved spec.

## Preconditions
- Gate 1 must be approved: `adlc get-state <KEY> gate1_spec_approved` must be `true`.
  If not, STOP and report — never write code past an unapproved spec.

## Rules
- **Follow `docs/adlc/<KEY>/tasks.md` in order**, respecting `deps:`; you may batch `[P]` tasks.
  Check off each task (`- [x] T00N`) as you complete it. Implement exactly what `spec.md`
  describes — no scope creep. If the spec/tasks are wrong or insufficient, STOP and report rather
  than redesigning on the fly.
- **Match the surrounding code**: naming, structure, error handling, imports, comment density.
  Read neighboring files before writing.
- Keep the diff minimal; reuse the utilities the spec identified.
- Work on the feature branch: `adlc branch <KEY>` checks it out (creating it if needed).
- Do NOT commit or push — that's stage 7, behind Gate 2. Do NOT write tests — that's stage 5
  (during a fix cycle you may adjust code to satisfy existing tests).

## Workflow
1. Confirm Gate 1, then `adlc branch <KEY>`.
2. Read `tasks.md`, `spec.md`, and the files they list; implement task by task in house style,
   checking off each `T00N` as you go.
3. Fix cycle (verification failed): read `docs/adlc/<KEY>/verification.md` and make the smallest
   change that addresses the failure.
4. `adlc set-state <KEY> current_stage tests`.

## Output (hand back to the orchestrator)
- Tasks completed (by ID); files created/modified with a one-line reason each; the active branch;
  anything that deviated from the spec/tasks (should be nothing — flag loudly if so).


# Stage 5 — Tests

Write tests that prove the acceptance criteria hold.

## Rules
- Cover the **Test plan** in `docs/adlc/<KEY>/spec.md`; every Gherkin `Scenario` gets at least
  one test. Name each test after its scenario so the mapping is obvious.
- Use the project's **existing** test framework and layout — detect it, don't impose a new one
  (`pytest`/`tests/`, `jest`/`vitest`/`*.test.*`, `go test`, `cargo test`, JUnit, …). Match the
  file locations and naming already present. If the project already uses a BDD runner
  (`behave`, `pytest-bdd`, `cucumber`, `godog`, …), wire the scenarios to it directly; otherwise a
  plainly-named test per scenario is fine — do **not** introduce a new BDD dependency.
- Write meaningful assertions (behavior, edge cases, error paths) — not `assert True`.
- Don't modify product code to make tests pass; if a test reveals a bug, report it for stage 4.
  You may add small fixtures/helpers.

## Workflow
1. Read `spec.md` (Test plan + Gherkin scenarios) and `ticket.md` (acceptance criteria).
2. Detect the framework and existing conventions (search config + sample tests).
3. Write tests in the right location with matching style.
4. Optionally do a quick syntax/collection check of just the new tests.
5. `adlc set-state <KEY> current_stage verify`.

## Output (hand back to the orchestrator)
- Test files created/modified; a scenario → test mapping (show full coverage); any scenario that
  can only be verified manually, and why.


# Stage 6 — Verify

Run the checks and report the truth. Never claim PASS without having actually run something and
seen it succeed.

## Rules
- **Auto-detect** how the project verifies itself, in priority order:
  1. A project-specific verify/run command if one exists — prefer it.
  2. Test runner: `pytest`/`python -m pytest`, `npm|pnpm|yarn test`, `go test ./...`,
     `cargo test`, `mvn test`, `make test`, …
  3. Build/typecheck/lint if fast: `npm run build`, `tsc --noEmit`, `ruff`/`flake8`, …
- Run the narrowest relevant checks first (the new tests), then a broader run if quick.
- Report failures **verbatim** — copy the real error output into the report. If you cannot find
  any way to run tests, say so explicitly (do NOT PASS). Do not edit product code.

## Workflow
1. Read `spec.md` to know what "done" means and which tests matter.
2. Detect the toolchain (look for `package.json`, `pyproject.toml`, `go.mod`, `Makefile`, …).
3. Run the tests (and a quick build/lint if fast); capture stdout/stderr and exit codes.
4. Write `docs/adlc/<KEY>/verification.md` (Result: PASS|FAIL, exact commands, output excerpts,
   coverage as Scenario → passing test). Bump the attempt counter:
   `adlc set-state <KEY> verify_attempts <n>`.
5. On PASS: `adlc set-state <KEY> current_stage ship`. On FAIL: leave stage at `verify`; the
   orchestrator loops to stage 4.

## Output (hand back to the orchestrator)
- **PASS** or **FAIL** (unambiguous); the exact commands run; on FAIL the specific failing
  tests/errors so stage 4 can fix them.


# Stage 7 — Ship  (after GATE 2)

Commit and push — but only after the human approved at Gate 2.

## Preconditions (verify first; if either fails, STOP and report)
- `adlc get-state <KEY> gate2_push_approved` is `true`.
- The latest `docs/adlc/<KEY>/verification.md` says **PASS**.

## Rules
- Plain **git only** (no `gh`). Never force-push. Never touch `main`/`master` directly.
- The `adlc ship` command does the mechanical part: checks Gate 2, checks out the branch,
  `git add -A`, commits (`<KEY>: <title>` + `Refs: spec.md`), pushes if a remote exists, and
  prints the compare URL. With no remote it commits locally and says so — that is success.
- Do not commit secrets or `.env`.

## Workflow
1. Confirm preconditions.
2. Run `adlc ship <KEY>` (add `--no-push` if the user chose "commit locally only").
3. Report the commit SHA, whether it pushed, and the compare URL.

## Output (hand back to the orchestrator)
- Commit SHA + message; pushed (and to which branch) or local-only; the **compare URL** for
  opening the PR manually (if a GitHub remote exists).



